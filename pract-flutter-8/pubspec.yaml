name: ninja_facts_app
description: Приложение с фактами от API Ninjas

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  get_it: ^8.0.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  video_player: ^2.8.3
  just_audio: ^0.9.39
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  location: ^5.0.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true